name: Price Checker

on:
  schedule:
    - cron: '0 00 * * *'    # Runs at 9 AM UTC daily
    - cron: '0 13 * * *'   # Runs at 5 PM UTC daily

jobs:
  price-check:
    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      
      - name: Install dependencies
        run: pip install -r requirements.txt
      
      - name: Run price checker
        env:
          EMAIL: ${{ secrets.EMAIL }}
          EMAIL_PASSWORD: ${{ secrets.PASSWORD }}
        run: python main.py
